app:
  db-host: postgres
  broker-host: activemq-docker
spring:
  datasource:
    url: jdbc:postgresql://${app.db-host}:5432/spring-rest-docker
    username: docker
    password: docker
  activemq:
    broker-url: tcp://${app.broker-host}:61616
    user: docker
    password: docker
    packages:
      trust-all: false
      trusted: com.nikolabojanic